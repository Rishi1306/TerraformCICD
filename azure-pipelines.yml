# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- feature/*
- main

pool: ado_agent_rike

stages:
- stage: BuildStage
  displayName: Build
  jobs: 
  - job: TerraformInitPlan
    displayName: Terraform Init and Plan Job
    steps:
    - task: TerraformTask@5
      displayName: Init Task
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/'
        backendServiceArm: 'svc-rike'
        backendAzureRmOverrideSubscriptionID: '5b9f49a3-8bda-49fa-88c0-baf31ef2f4f3'
        backendAzureRmResourceGroupName: 'rike-rg-1'
        backendAzureRmStorageAccountName: 'rikestorage13'
        backendAzureRmContainerName: 'pipedrum'
        backendAzureRmKey: 'pipedrum.tfstate'

    - task: TerraformTask@5
      displayName: Plan task
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/'
        environmentServiceNameAzureRM: 'svc-rike'
        commandOptions: '-out=$(Build.ArtifactStagingDirectory)/tfplan'

    - task: PublishPipelineArtifact@1                       # FIX 3 cont: publish plan for Deploy stage to consume
      displayName: Publish Terraform Plan
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/tfplan'
        artifact: 'terraform-plan'

- stage: DeployStage
  displayName: Deploy
  dependsOn: BuildStage
  condition: and(succeeded('BuildStage'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  - job: TerraformApply
    displayName: Terraform Apply Job
    steps:

    - task: DownloadPipelineArtifact@2
      displayName: Download Terraform Plan
      inputs:
        artifact: 'terraform-plan'
        path: '$(Pipeline.Workspace)/terraform-plan'

    - task: TerraformTask@5
      displayName: Terraform Init (Deploy)
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/'
        backendServiceArm: 'svc-rike'
        backendAzureRmOverrideSubscriptionID: '5b9f49a3-8bda-49fa-88c0-baf31ef2f4f3'
        backendAzureRmResourceGroupName: 'rike-rg-1'
        backendAzureRmStorageAccountName: 'rikestorage13'
        backendAzureRmContainerName: 'pipedrum'
        backendAzureRmKey: 'pipedrum.tfstate'

    - task: TerraformTask@5
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(System.DefaultWorkingDirectory)/'
        environmentServiceNameAzureRM: 'svc-rike'
        commandOptions: '$(Pipeline.Workspace)/terraform-plan/tfplan'
