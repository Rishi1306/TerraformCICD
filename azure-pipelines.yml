name: 'Terraform Azure Infrastructure CI/CD Pipeline'

trigger:
- feature/*
- main

pool: ado_agent_rike

variables:
  workDir: '$(System.DefaultWorkingDirectory)/'

stages:
- stage: BuildStage
  displayName: Build
  jobs: 
  - job: TerraformInitPlan
    displayName: Terraform Init and Plan Job
    steps:
    - task: TerraformTask@5
      displayName: Init Task
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workDir)
        backendServiceArm: 'svc-rike'
        backendAzureRmOverrideSubscriptionID: '$(ARM_SUBSCRIPTION_ID)'
        backendAzureRmResourceGroupName: 'rike-rg-1'
        backendAzureRmStorageAccountName: '$(TF_BACKEND_STORAGE)'
        backendAzureRmContainerName: 'pipedrum'
        backendAzureRmKey: 'pipedrum.tfstate'

    - task: TerraformTask@5
      displayName: Validate Task                            
      inputs:
        provider: 'azurerm'
        command: 'validate'
        workingDirectory: $(workDir)
        environmentServiceNameAzureRM: 'svc-rike'

    - task: TerraformTask@5
      displayName: Plan task
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: $(workDir)
        environmentServiceNameAzureRM: 'svc-rike'
        commandOptions: '-out=$(Build.ArtifactStagingDirectory)/tfplan'

    - task: PublishPipelineArtifact@1                   
      displayName: Publish Terraform Plan
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/tfplan'
        artifact: 'terraform-plan'

- stage: SecurityStage
  displayName: Security Scan
  dependsOn: BuildStage
  jobs:
  - job: CheckovScan
    displayName: Checkov IaC Scan
    steps:
    - script: |
        pip install checkov
        checkov -d $(System.DefaultWorkingDirectory) --framework terraform
      displayName: Run Checkov Scan

- stage: DeployStage
  displayName: Deploy
  dependsOn: SecurityStage
  condition: and(succeeded('SecurityStage'),eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:

  - job: TerraformApply
    displayName: Terraform Apply Job
    steps:

    - task: DownloadPipelineArtifact@2
      displayName: Download Terraform Plan
      inputs:
        artifact: 'terraform-plan'
        path: '$(Pipeline.Workspace)/terraform-plan'

    - task: TerraformTask@5
      displayName: Terraform Init (Deploy)
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: $(workDir)
        backendServiceArm: 'svc-rike'
        backendAzureRmOverrideSubscriptionID: '$(ARM_SUBSCRIPTION_ID)'
        backendAzureRmResourceGroupName: 'rike-rg-1'
        backendAzureRmStorageAccountName: '$(TF_BACKEND_STORAGE)'
        backendAzureRmContainerName: 'pipedrum'
        backendAzureRmKey: 'pipedrum.tfstate'

    - task: TerraformTask@5
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: $(workDir)
        environmentServiceNameAzureRM: 'svc-rike'
        commandOptions: '$(Pipeline.Workspace)/terraform-plan/tfplan'
